[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Custom markers (run subsets with: pytest -m wap) ──────────────────────────
markers =
    wap:        WAP / mobile web tests
    smoke:      Quick sanity checks — run on every commit
    regression: Full regression suite

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
